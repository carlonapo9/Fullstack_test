<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CarloChat</title>

    <!-- LINK TO CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="app">

        <div id="header">
            🤖 CarloChat
        </div>

        <div id="chat-container">

            <div id="messages"></div>

            <div id="input-bar">
                <input id="message-input" type="text" placeholder="Type a message..." />
                <button id="send-btn">Send</button>
            </div>

        </div>

    </div>

    <!-- LINK TO JS -->
    <script src="app.js"></script>

</body>
</html>
