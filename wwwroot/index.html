<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CarloChat</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            overflow: hidden;
        }

        /* APP WRAPPER */
        #app {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 🔵 BRAND HEADER */
        #header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            font-size: 22px;
            font-weight: bold;
            background: #0078ff;
            color: white;
            letter-spacing: 1px;
            flex-shrink: 0;
        }

        /* CHAT AREA */
        #chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* MESSAGES */
        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-radius: 12px;
            line-height: 1.4;
            font-size: 15px;
        }

        .user {
            background: #0078ff;
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 0;
        }

        .ai {
            background: white;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 0;
            border: 1px solid #ddd;
        }

        /* INPUT BAR */
        #input-bar {
            display: flex;
            padding: 12px;
            background: white;
            border-top: 1px solid #ddd;
            flex-shrink: 0;
        }

        #message-input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        #send-btn {
            margin-left: 10px;
            padding: 10px 18px;
            background: #0078ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

            #send-btn:hover {
                background: #005fcc;
            }
    </style>
</head>

<body>

    <div id="app">

        <!-- 🔵 BRAND HEADER -->
        <div id="header">
            🤖 CarloChat
        </div>

        <div id="chat-container">

            <div id="messages"></div>

            <div id="input-bar">
                <input id="message-input" type="text" placeholder="Type a message..." />
                <button id="send-btn">Send</button>
            </div>

        </div>

    </div>

    <script>
        const messagesDiv = document.getElementById("messages");
        const input = document.getElementById("message-input");
        const sendBtn = document.getElementById("send-btn");

        // SESSION ID (memory per browser)
        let sessionId = localStorage.getItem("sessionId");

        if (!sessionId) {
            sessionId = crypto.randomUUID();
            localStorage.setItem("sessionId", sessionId);
        }

        function addMessage(text, sender) {
            const bubble = document.createElement("div");
            bubble.classList.add("bubble", sender);
            bubble.textContent = text;
            messagesDiv.appendChild(bubble);

            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, "user");
            input.value = "";

            const response = await fetch("/api/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    sessionId: sessionId,
                    message: text
                })
            });

            const data = await response.json();
            addMessage(data.reply, "ai");
        }

        sendBtn.onclick = sendMessage;

        input.addEventListener("keypress", e => {
            if (e.key === "Enter") sendMessage();
        });
    </script>

</body>
</html>
